<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>XAU/USD Terminal -- Predicción de Oro en Tiempo Real</title>
    <meta
      name="description"
      content="Terminal profesional para el precio del oro (XAU/USD) en tiempo real: velas, señales y predicción probabilística."
    />
    <meta property="og:title" content="XAU/USD Terminal -- Predicción de Oro" />
    <meta property="og:description" content="Cotización en vivo del oro, gráficos de velas y señales técnicas." />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://api.binance.com" />
    <link rel="preconnect" href="https://stream.binance.com" />
    <script src="https://unpkg.com/lightweight-charts@5.0.6/dist/lightweight-charts.standalone.production.js"></script>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b0d10;
        --card: #14171c;
        --border: rgba(255, 255, 255, 0.08);
        --border-strong: rgba(255, 255, 255, 0.16);
        --fg: #e7e7ea;
        --muted: #8b8f98;
        --gold: #e5b84a;
        --up: #22c58a;
        --down: #e5484d;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }
      body {
        background: var(--bg);
        color: var(--fg);
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
      }
      .wrap { max-width: 1100px; margin: 0 auto; padding: 0 16px; }
      header {
        border-bottom: 1px solid var(--border);
      }
      .header-row {
        display: flex; align-items: center; justify-content: space-between;
        padding: 12px 0;
      }
      .brand { display: flex; align-items: center; gap: 12px; }
      .brand-logo {
        width: 36px; height: 36px; border-radius: 8px;
        background: rgba(229, 184, 74, 0.15);
        color: var(--gold); font-weight: 700;
        display: flex; align-items: center; justify-content: center;
        font-size: 15px; letter-spacing: 0.5px;
      }
      .brand-title { font-size: 13px; font-weight: 600; line-height: 1.1; }
      .brand-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
      .status {
        display: inline-flex; align-items: center; gap: 6px;
        border: 1px solid; border-radius: 999px;
        padding: 4px 10px; font-size: 11px; font-weight: 500;
      }
      .status-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
      main { padding: 16px 0 32px; }
      .price-row { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
      .price { font-size: 36px; font-weight: 600; font-variant-numeric: tabular-nums; }
      .change { font-size: 14px; font-weight: 500; font-variant-numeric: tabular-nums; }
      .tf {
        margin-top: 16px;
        display: inline-flex; padding: 4px; gap: 2px;
        background: rgba(255,255,255,0.03);
        border: 1px solid var(--border); border-radius: 10px;
      }
      .tf button {
        appearance: none; border: 0; background: transparent;
        color: var(--muted); font-size: 12px; font-weight: 500;
        padding: 6px 12px; border-radius: 6px; cursor: pointer;
        transition: color .15s, background .15s;
      }
      .tf button:hover { color: var(--fg); }
      .tf button.active { background: var(--gold); color: #1a1408; }
      .card {
        margin-top: 16px;
        background: rgba(255,255,255,0.02);
        border: 1px solid var(--border);
        border-radius: 14px;
      }
      .pred { padding: 18px 20px; }
      .pred-head {
        display: flex; justify-content: space-between; align-items: baseline;
        gap: 8px; flex-wrap: wrap;
      }
      .pred-label {
        font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
        color: var(--muted);
      }
      .pred-value { font-size: 28px; font-weight: 600; font-variant-numeric: tabular-nums; margin-top: 4px; }
      .signal {
        border: 1px solid; border-radius: 8px;
        padding: 6px 12px; font-size: 13px; font-weight: 600;
        letter-spacing: 0.04em;
      }
      .mini-grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 12px; margin-top: 14px; }
      .mini-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }
      .mini-value { margin-top: 2px; font-weight: 600; font-variant-numeric: tabular-nums; font-size: 14px; }
      @media (max-width: 520px) {
        .mini-grid { grid-template-columns: 1fr; gap: 8px; }
        .price { font-size: 30px; }
      }
      .chart-head {
        display: flex; justify-content: space-between; align-items: center;
        padding: 8px 14px; border-bottom: 1px solid var(--border);
      }
      .chart-head .label { font-size: 12px; color: var(--muted); }
      .icon-btn {
        appearance: none; background: transparent; cursor: pointer;
        border: 1px solid var(--border); border-radius: 8px;
        width: 30px; height: 30px; color: var(--muted);
        display: inline-flex; align-items: center; justify-content: center;
        transition: color .15s, background .15s;
      }
      .icon-btn:hover { color: var(--fg); background: rgba(255,255,255,0.04); }
      #chart {
        width: 100%;
        height: 460px;
        transition: height .25s ease;
        overflow: hidden;
      }
      #chart.collapsed { height: 0; }
      .disclaimer { margin-top: 24px; font-size: 11px; color: var(--muted); line-height: 1.5; }
    </style>
  </head>
  <body>
    <header>
      <div class="wrap header-row">
        <div class="brand">
          <div class="brand-logo">Au</div>
          <div>
            <div class="brand-title">XAU / USD</div>
            <div class="brand-sub">Gold · Terminal</div>
          </div>
        </div>
        <span id="status" class="status" style="color: var(--gold); border-color: rgba(229,184,74,0.4);">
          <span class="status-dot"></span><span id="status-text">Conectando</span>
        </span>
      </div>
    </header>
    <main class="wrap">
      <div class="price-row">
        <div id="price" class="price">--</div>
        <div id="change" class="change"></div>
      </div>
      <div id="tf" class="tf"></div>
      <!-- Predicción arriba del gráfico -->
      <div class="card pred">
        <div class="pred-head">
          <div>
            <div class="pred-label">Predicción · próximo <span id="horizon-label">--</span></div>
            <div id="pred-value" class="pred-value">--</div>
          </div>
          <div id="signal" class="signal" style="color: var(--muted); border-color: rgba(255,255,255,0.16);">--</div>
        </div>
        <div id="mini-grid" class="mini-grid" style="display:none;">
          <div><div class="mini-label">Cambio esperado</div><div id="m-change" class="mini-value">--</div></div>
          <div><div class="mini-label">Rango 95%</div><div id="m-range" class="mini-value">--</div></div>
          <div><div class="mini-label">Confianza</div><div id="m-conf" class="mini-value">--</div></div>
        </div>
      </div>
      <!-- Gráfico con minimizar -->
      <div class="card">
        <div class="chart-head">
          <div class="label">Gráfico · <span id="tf-label">--</span></div>
          <button id="toggle-chart" class="icon-btn" aria-label="Minimizar gráfico">
            <svg id="chev" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>
          </button>
        </div>
        <div id="chart"></div>
      </div>
      <p class="disclaimer">
        Las predicciones son probabilísticas y no constituyen asesoramiento financiero.
        Datos en vivo: Binance PAXG/USDT como proxy de XAU/USD.
      </p>
    </main>
    <script>
      const SYMBOL = "paxgusdt";
      const TIMEFRAMES = [
        { key: "1m",  label: "1m",  horizon: "1 minuto",  seconds: 60 },
        { key: "5m",  label: "5m",  horizon: "5 minutos", seconds: 5*60 },
        { key: "15m", label: "15m", horizon: "15 minutos", seconds: 15*60 },
        { key: "1h",  label: "1h",  horizon: "1 hora",    seconds: 60*60 },
        { key: "1d",  label: "1D",  horizon: "1 día",     seconds: 24*60*60 },
        { key: "1w",  label: "1W",  horizon: "1 semana",  seconds: 7*24*60*60 },
      ];
      const fmt = (n) => n.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      // State
      let tf = "15m";
      let klines = [];
      let price = null;
      let ws = null;
      let wsClosed = false;
      let wsRetry = 0;
      // Chart setup
      const chartEl = document.getElementById("chart");
      const chart = LightweightCharts.createChart(chartEl, {
        layout: {
          background: { color: "transparent" },
          textColor: "#c9c9d1",
          fontFamily: "ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif",
        },
        grid: {
          vertLines: { color: "rgba(255,255,255,0.04)" },
          horzLines: { color: "rgba(255,255,255,0.06)" },
        },
        rightPriceScale: { borderColor: "rgba(255,255,255,0.08)" },
        timeScale: { borderColor: "rgba(255,255,255,0.08)", timeVisible: true, secondsVisible: false },
        crosshair: { mode: 1 },
        autoSize: true,
      });
      const candle = chart.addSeries(LightweightCharts.CandlestickSeries, {
        upColor: "#22c58a", downColor: "#e5484d",
        wickUpColor: "#22c58a", wickDownColor: "#e5484d",
        borderVisible: false,
      });
      const predLine = chart.addSeries(LightweightCharts.LineSeries, {
        color: "#e5b84a", lineWidth: 2, lineStyle: 2,
        lastValueVisible: false, priceLineVisible: false,
      });
      // Build timeframe buttons
      const tfWrap = document.getElementById("tf");
      TIMEFRAMES.forEach((t) => {
        const b = document.createElement("button");
        b.textContent = t.label;
        b.dataset.key = t.key;
        b.addEventListener("click", () => setTimeframe(t.key));
        tfWrap.appendChild(b);
      });
      // Minimize toggle
      const chev = document.getElementById("chev");
      document.getElementById("toggle-chart").addEventListener("click", () => {
        const collapsed = chartEl.classList.toggle("collapsed");
        chev.innerHTML = collapsed
          ? '<polyline points="6 9 12 15 18 9"></polyline>'
          : '<polyline points="18 15 12 9 6 15"></polyline>';
      });
      function setStatus(kind) {
        const el = document.getElementById("status");
        const t = document.getElementById("status-text");
        if (kind === "live") {
          el.style.color = "var(--up)"; el.style.borderColor = "rgba(34,197,138,0.4)";
          t.textContent = "LIVE";
        } else if (kind === "offline") {
          el.style.color = "var(--down)"; el.style.borderColor = "rgba(229,72,77,0.4)";
          t.textContent = "Offline";
        } else {
          el.style.color = "var(--gold)"; el.style.borderColor = "rgba(229,184,74,0.4)";
          t.textContent = "Conectando";
        }
      }
      function updateTfUI() {
        [...tfWrap.children].forEach((b) => {
          b.classList.toggle("active", b.dataset.key === tf);
        });
        const info = TIMEFRAMES.find((x) => x.key === tf);
        document.getElementById("horizon-label").textContent = info.horizon;
        document.getElementById("tf-label").textContent = info.label;
      }
      async function fetchKlines(interval, limit = 300) {
        const url = `https://api.binance.com/api/v3/klines?symbol=PAXGUSDT&interval=${interval}&limit=${limit}`;
        const r = await fetch(url);
        const raw = await r.json();
        return raw.map((k) => ({
          t: Math.floor(k[0] / 1000),
          o: parseFloat(k[1]), h: parseFloat(k[2]),
          l: parseFloat(k[3]), c: parseFloat(k[4]),
        }));
      }
      // Prediction: EMA(20) mean-reversion + momentum drift, 95% band via stdev of log-returns.
      function predictNext(kl, horizonSeconds) {
        if (kl.length < 25) return null;
        const closes = kl.map((k) => k.c);
        const period = 20, kf = 2 / (period + 1);
        let ema = closes.slice(0, period).reduce((a, b) => a + b, 0) / period;
        for (let i = period; i < closes.length; i++) ema = closes[i] * kf + ema * (1 - kf);
        const rets = [];
        for (let i = Math.max(1, closes.length - 30); i < closes.length; i++) {
          rets.push(Math.log(closes[i] / closes[i - 1]));
        }
        const mean = rets.reduce((a, b) => a + b, 0) / rets.length;
        const variance = rets.reduce((a, b) => a + (b - mean) ** 2, 0) / rets.length;
        const sd = Math.sqrt(variance);
        const last = closes[closes.length - 1];
        const drift = mean;
        const reversion = Math.log(ema / last) * 0.4;
        const expected = drift * 0.6 + reversion;
        const predicted = last * Math.exp(expected);
        const lower = last * Math.exp(expected - 1.96 * sd);
        const upper = last * Math.exp(expected + 1.96 * sd);
        const changePct = ((predicted - last) / last) * 100;
        let signal = "NEUTRO";
        if (changePct > 0.15) signal = "COMPRAR";
        else if (changePct < -0.15) signal = "VENDER";
        const noise = sd || 1e-9;
        const confidence = Math.max(0, Math.min(1, Math.abs(expected) / (noise * 1.96)));
        return { predicted, lower, upper, changePct, signal, confidence, horizonSeconds };
      }
      function renderPrice() {
        document.getElementById("price").textContent = price === null ? "--" : `$${fmt(price)}`;
        const changeEl = document.getElementById("change");
        if (klines.length < 2 || price === null) { changeEl.textContent = ""; return; }
        const prev = klines[klines.length - 2].c;
        const abs = price - prev;
        const pct = (abs / prev) * 100;
        const up = abs >= 0;
        changeEl.style.color = up ? "var(--up)" : "var(--down)";
        changeEl.textContent = `${up ? "▲" : "▼"} ${fmt(Math.abs(abs))} (${pct.toFixed(2)}%)`;
      }
      function renderPrediction() {
        const info = TIMEFRAMES.find((x) => x.key === tf);
        const p = predictNext(klines, info.seconds);
        const predVal = document.getElementById("pred-value");
        const sig = document.getElementById("signal");
        const grid = document.getElementById("mini-grid");
        if (!p) {
          predVal.textContent = "--"; sig.textContent = "--";
          sig.style.color = "var(--muted)"; sig.style.borderColor = "rgba(255,255,255,0.16)";
          grid.style.display = "none";
          predLine.setData([]);
          return;
        }
        predVal.textContent = `$${fmt(p.predicted)}`;
        sig.textContent = p.signal;
        const color = p.signal === "COMPRAR" ? "var(--up)" : p.signal === "VENDER" ? "var(--down)" : "var(--muted)";
        sig.style.color = color;
        sig.style.borderColor =
          p.signal === "COMPRAR" ? "rgba(34,197,138,0.4)" :
          p.signal === "VENDER"  ? "rgba(229,72,77,0.4)"  : "rgba(255,255,255,0.16)";
        grid.style.display = "";
        const mc = document.getElementById("m-change");
        mc.textContent = `${p.changePct >= 0 ? "+" : ""}${p.changePct.toFixed(2)}%`;
        mc.style.color = p.changePct >= 0 ? "var(--up)" : "var(--down)";
        document.getElementById("m-range").textContent = `$${fmt(p.lower)} – $${fmt(p.upper)}`;
        document.getElementById("m-conf").textContent = `${Math.round(p.confidence * 100)}%`;
        const last = klines[klines.length - 1];
        predLine.setData([
          { time: last.t, value: last.c },
          { time: last.t + info.seconds, value: p.predicted },
        ]);
      }
      async function loadTimeframe() {
        updateTfUI();
        try {
          const kl = await fetchKlines(tf);
          klines = kl;
          candle.setData(kl.map((k) => ({ time: k.t, open: k.o, high: k.h, low: k.l, close: k.c })));
          chart.timeScale().fitContent();
          price = kl[kl.length - 1]?.c ?? null;
          renderPrice();
          renderPrediction();
        } catch (e) {
          console.error(e);
        }
      }
      function connectWs() {
        setStatus("connecting");
        const url = `wss://stream.binance.com:9443/stream?streams=${SYMBOL}@kline_${tf}/${SYMBOL}@trade`;
        ws = new WebSocket(url);
        ws.onopen = () => { wsRetry = 0; setStatus("live"); };
        ws.onmessage = (ev) => {
          try {
            const msg = JSON.parse(ev.data);
            const stream = msg.stream, d = msg.data;
            if (stream.endsWith("@trade")) {
              price = parseFloat(d.p);
              renderPrice();
            } else if (stream.includes("@kline_")) {
              const k = d.k;
              const t = Math.floor(k.t / 1000);
              const c = { time: t, open: parseFloat(k.o), high: parseFloat(k.h), low: parseFloat(k.l), close: parseFloat(k.c) };
              candle.update(c);
              if (klines.length) {
                const last = klines[klines.length - 1];
                const item = { t, o: c.open, h: c.high, l: c.low, c: c.close };
                if (last.t === t) klines[klines.length - 1] = item;
                else klines.push(item);
                renderPrediction();
              }
            }
          } catch {}
        };
        ws.onclose = () => {
          if (wsClosed) return;
          setStatus("offline");
          wsRetry = Math.min(wsRetry + 1, 6);
          setTimeout(connectWs, 500 * 2 ** wsRetry);
        };
        ws.onerror = () => { try { ws.close(); } catch {} };
      }
      function setTimeframe(next) {
        if (next === tf) return;
        tf = next;
        try { wsClosed = true; ws && ws.close(); } catch {}
        wsClosed = false;
        loadTimeframe().then(connectWs);
      }
      // Boot
      updateTfUI();
      loadTimeframe().then(connectWs);
    </script>
  </body>
</html>
